<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dig Game Alpha 1</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div id="game-root" aria-label="Game canvas">
    <button id="fs-btn" title="Enter fullscreen" aria-label="Toggle fullscreen" aria-pressed="false">&#x26F6;</button>
  </div>

  <script src="./libs/phaser.js"></script>
  <script type="module" src="./main.js"></script>
  <script>
    (function() {
      'use strict';

      var fsBtn = document.getElementById('fs-btn');
      var gameRoot = document.getElementById('game-root');
      var fallbackFullscreen = false;

      function getFullscreenElement() {
        return document.fullscreenElement ||
          document.webkitFullscreenElement ||
          document.msFullscreenElement ||
          null;
      }

      function isGameFullscreen() {
        return getFullscreenElement() === gameRoot || fallbackFullscreen;
      }

      function requestGameFullscreen() {
        var request = gameRoot.requestFullscreen ||
          gameRoot.webkitRequestFullscreen ||
          gameRoot.msRequestFullscreen;
        if (!request) return Promise.resolve(enterFallbackFullscreen());
        return Promise.resolve(request.call(gameRoot));
      }

      function exitGameFullscreen() {
        var exit = document.exitFullscreen ||
          document.webkitExitFullscreen ||
          document.msExitFullscreen;
        if (!exit) return Promise.resolve();
        return Promise.resolve(exit.call(document));
      }

      function enterFallbackFullscreen() {
        fallbackFullscreen = true;
        gameRoot.classList.add('fullscreen-fallback');
      }

      function exitFallbackFullscreen() {
        fallbackFullscreen = false;
        gameRoot.classList.remove('fullscreen-fallback');
      }

      function refreshPhaserLayout() {
        var game = window.__phaserGame;
        if (!game || !game.scene) return;

        var refresh = function() {
          try {
            var scenes = game.scene.getScenes ? game.scene.getScenes(true) : [];
            scenes.forEach(function(scene) {
              if (scene.scale && typeof scene.scale.refresh === 'function') {
                scene.scale.refresh();
              }
              var cam = scene.cameras && scene.cameras.main;
              if (cam && typeof cam.setFollowOffset === 'function') {
                cam.setFollowOffset(0, 0);
              }
            });
            window.dispatchEvent(new Event('resize'));
          } catch (error) {
            console.warn('[Fullscreen] Failed to refresh Phaser layout:', error);
          }
        };

        requestAnimationFrame(refresh);
        window.setTimeout(refresh, 120);
      }

      function syncFullscreenButton() {
        var active = isGameFullscreen();
        fsBtn.setAttribute('aria-pressed', active ? 'true' : 'false');
        fsBtn.classList.toggle('is-fullscreen', active);
        fsBtn.title = active ? 'Exit fullscreen' : 'Enter fullscreen';
      }

      window.__isGameFullscreen = isGameFullscreen;
      window.__toggleGameFullscreen = function() {
        var nativeFullscreen = getFullscreenElement() === gameRoot;
        var entering = !nativeFullscreen && !fallbackFullscreen;
        var action;
        if (nativeFullscreen) {
          action = exitGameFullscreen().then(exitFallbackFullscreen);
        } else if (fallbackFullscreen) {
          action = Promise.resolve(exitFallbackFullscreen());
        } else {
          action = requestGameFullscreen().catch(function(error) {
            console.warn('[Fullscreen] Native fullscreen unavailable, using viewport fallback:', error);
            enterFallbackFullscreen();
          });
        }
        return action.then(function() {
          if (entering && !getFullscreenElement() && !fallbackFullscreen) {
            enterFallbackFullscreen();
          }
          syncFullscreenButton();
          refreshPhaserLayout();
          return isGameFullscreen();
        });
      };

      fsBtn.addEventListener('click', function() {
        window.__toggleGameFullscreen().catch(function(error) {
          console.warn('[Fullscreen] Toggle failed:', error);
        });
      });

      function onFullscreenChange() {
        if (getFullscreenElement() === gameRoot) {
          exitFallbackFullscreen();
        }
        syncFullscreenButton();
        refreshPhaserLayout();
      }

      document.addEventListener('fullscreenchange', onFullscreenChange);
      document.addEventListener('webkitfullscreenchange', onFullscreenChange);
      document.addEventListener('MSFullscreenChange', onFullscreenChange);
      document.addEventListener('keydown', function(event) {
        if (event.key === 'Tab' && isGameFullscreen()) {
          event.preventDefault();
          event.stopImmediatePropagation();
          window.__fullscreenToggleHandledAt = Date.now();
          window.__toggleGameFullscreen().catch(function(error) {
            console.warn('[Fullscreen] Toggle failed:', error);
          });
        }
      });
      syncFullscreenButton();
    })();
  </script>
</body>
</html>
